<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Estimativa Orçamentária - Gastroperformance</title>
    <link rel="icon" href="assets/brand/Logo-Vector.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="budget.css" />
  </head>
  <body>
    <aside class="budget-tools" aria-label="Ferramentas do documento">
      <div class="budget-tools__brand">
        <img src="assets/brand/Logo-Vector.svg" alt="Mattar" />
        <div>
          <strong>Documento editável</strong>
          <span>Estimativa / PDF</span>
        </div>
      </div>
      <button type="button" data-action="save">Salvar</button>
      <button type="button" data-action="share">Gerar link</button>
      <button type="button" data-action="print">Exportar PDF</button>
      <button type="button" data-action="reset">Restaurar modelo</button>
      <p class="budget-status" role="status"></p>
      <p class="budget-hint">Clique diretamente em qualquer texto para editar. Use + e - para mudar tópicos.</p>
    </aside>
    <main class="budget-document" aria-label="Documento de estimativa orçamentária"></main>
    <script src="budget.js"></script>
  </body>
</html>
